      OAUTH2_PROXY_COOKIE_SECRET: ${OAUTH2_PROXY_COOKIE_SECRET}
      OAUTH2_PROXY_COOKIE_NAME: _oauth2_proxy_dispatch
      OAUTH2_PROXY_COOKIE_SECURE: "true"
      OAUTH2_PROXY_COOKIE_SAMESITE: lax
      OAUTH2_PROXY_COOKIE_DOMAINS: ${DISPATCH_HOST}
      OAUTH2_PROXY_WHITELIST_DOMAINS: .${DISPATCH_HOST},${KEYCLOAK_HOST}${PLATFORM_PUBLIC_PORT_SUFFIX}
      OAUTH2_PROXY_REDIRECT_URL: ${PLATFORM_PUBLIC_SCHEME}://${DISPATCH_HOST}${PLATFORM_PUBLIC_PORT_SUFFIX}/oauth2/callback
