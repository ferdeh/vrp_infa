name: ${COMPOSE_PROJECT_NAME:-vrp-infra}

services:
  traefik:
    image: traefik:v3.1
    command:
      - --configFile=/etc/traefik/traefik.yml
    ports:
      - ${TRAEFIK_BIND_HOST:-127.0.0.1}:${TRAEFIK_HTTP_PORT:-80}:80
      - ${TRAEFIK_BIND_HOST:-127.0.0.1}:${TRAEFIK_DASHBOARD_PORT:-8081}:8080
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./infra/traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./infra/traefik/dynamic:/etc/traefik/dynamic:ro
    networks:
      edge:
        aliases:
          - ${KEYCLOAK_HOST}
      private: {}
    restart: unless-stopped

  keycloak-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${KEYCLOAK_DB_NAME}
      POSTGRES_USER: ${KEYCLOAK_DB_USER}
      POSTGRES_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
    volumes:
      - keycloak_db_data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${KEYCLOAK_DB_USER} -d ${KEYCLOAK_DB_NAME}
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - private
    restart: unless-stopped

  keycloak:
    platform: ${KEYCLOAK_PLATFORM:-linux/amd64}
    image: quay.io/keycloak/keycloak:26.1
    command:
      - start-dev
    environment:
      KC_DB: postgres
      KC_DB_URL_HOST: ${KEYCLOAK_DB_HOST}
      KC_DB_URL_PORT: ${KEYCLOAK_DB_PORT}
      KC_DB_URL_DATABASE: ${KEYCLOAK_DB_NAME}
      KC_DB_USERNAME: ${KEYCLOAK_DB_USER}
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME: ${PLATFORM_PUBLIC_SCHEME}://${KEYCLOAK_HOST}${PLATFORM_PUBLIC_PORT_SUFFIX}
      KC_HOSTNAME_STRICT: "false"
      KC_PROXY_HEADERS: xforwarded
      KC_HEALTH_ENABLED: "true"
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
    depends_on:
      keycloak-db:
        condition: service_healthy
    networks:
      - edge
      - private
    labels:
      - traefik.enable=true
      - traefik.docker.network=${COMPOSE_PROJECT_NAME:-vrp-infra}_edge
      - traefik.http.routers.keycloak.rule=Host(`${KEYCLOAK_HOST}`)
      - traefik.http.routers.keycloak.entrypoints=web
      - traefik.http.routers.keycloak.middlewares=platform-security@file
      - traefik.http.services.keycloak.loadbalancer.server.port=8080
    restart: unless-stopped

  keycloak-bootstrap:
    platform: ${KEYCLOAK_PLATFORM:-linux/amd64}
    image: quay.io/keycloak/keycloak:26.1
    env_file:
      - .env
    volumes:
      - ./infra/keycloak/bootstrap/bootstrap.sh:/opt/bootstrap/bootstrap.sh:ro
    entrypoint:
      - /bin/bash
      - /opt/bootstrap/bootstrap.sh
    depends_on:
      keycloak:
        condition: service_started
    networks:
      - edge
      - private
    restart: "no"

  oauth2-proxy-portal:
    image: quay.io/oauth2-proxy/oauth2-proxy:v7.7.1
    environment:
      OAUTH2_PROXY_PROVIDER: oidc
      OAUTH2_PROXY_OIDC_ISSUER_URL: ${KEYCLOAK_INTERNAL_URL}/realms/${KEYCLOAK_REALM}
      OAUTH2_PROXY_SKIP_OIDC_DISCOVERY: "true"
      OAUTH2_PROXY_INSECURE_OIDC_SKIP_ISSUER_VERIFICATION: "true"
      OAUTH2_PROXY_LOGIN_URL: ${PLATFORM_PUBLIC_SCHEME}://${KEYCLOAK_HOST}${PLATFORM_PUBLIC_PORT_SUFFIX}/realms/${KEYCLOAK_REALM}/protocol/openid-connect/auth
      OAUTH2_PROXY_REDEEM_URL: http://keycloak:8080/realms/${KEYCLOAK_REALM}/protocol/openid-connect/token
      OAUTH2_PROXY_OIDC_JWKS_URL: http://keycloak:8080/realms/${KEYCLOAK_REALM}/protocol/openid-connect/certs
      OAUTH2_PROXY_PROFILE_URL: http://keycloak:8080/realms/${KEYCLOAK_REALM}/protocol/openid-connect/userinfo
      OAUTH2_PROXY_CLIENT_ID: ${OAUTH2_PROXY_CLIENT_ID}-portal
      OAUTH2_PROXY_CLIENT_SECRET: ${OAUTH2_PROXY_CLIENT_SECRET}
      OAUTH2_PROXY_COOKIE_SECRET: ${OAUTH2_PROXY_COOKIE_SECRET}
      OAUTH2_PROXY_COOKIE_NAME: _oauth2_proxy_portal
      OAUTH2_PROXY_COOKIE_SECURE: "false"
      OAUTH2_PROXY_COOKIE_SAMESITE: lax
      OAUTH2_PROXY_COOKIE_DOMAINS: ${PORTAL_HOST}
      OAUTH2_PROXY_WHITELIST_DOMAINS: .${PORTAL_HOST}
      OAUTH2_PROXY_REDIRECT_URL: ${PLATFORM_PUBLIC_SCHEME}://${PORTAL_HOST}${PLATFORM_PUBLIC_PORT_SUFFIX}/oauth2/callback
      OAUTH2_PROXY_HTTP_ADDRESS: 0.0.0.0:4180
      OAUTH2_PROXY_EMAIL_DOMAINS: '*'
      OAUTH2_PROXY_SCOPE: openid profile email roles
      OAUTH2_PROXY_CODE_CHALLENGE_METHOD: S256
      OAUTH2_PROXY_REVERSE_PROXY: "true"
      OAUTH2_PROXY_SKIP_PROVIDER_BUTTON: "true"
      OAUTH2_PROXY_PASS_ACCESS_TOKEN: "true"
      OAUTH2_PROXY_PASS_AUTHORIZATION_HEADER: "true"
      OAUTH2_PROXY_PASS_USER_HEADERS: "true"
      OAUTH2_PROXY_SET_XAUTHREQUEST: "true"
      OAUTH2_PROXY_SET_AUTHORIZATION_HEADER: "true"
      OAUTH2_PROXY_PREFER_EMAIL_TO_USER: "false"
      OAUTH2_PROXY_UPSTREAMS: http://portal:3000
    depends_on:
      keycloak-bootstrap:
        condition: service_completed_successfully
      portal:
        condition: service_healthy
    networks:
      - edge
      - private
    labels:
      - traefik.enable=true
      - traefik.docker.network=${COMPOSE_PROJECT_NAME:-vrp-infra}_edge
      - traefik.http.routers.portal.rule=Host(`${PORTAL_HOST}`)
      - traefik.http.routers.portal.entrypoints=web
      - traefik.http.routers.portal.middlewares=platform-security@file
      - traefik.http.services.oauth2-proxy-portal.loadbalancer.server.port=4180
    restart: unless-stopped

  oauth2-proxy-truck:
    image: quay.io/oauth2-proxy/oauth2-proxy:v7.7.1
    environment:
      OAUTH2_PROXY_PROVIDER: oidc
      OAUTH2_PROXY_OIDC_ISSUER_URL: ${KEYCLOAK_INTERNAL_URL}/realms/${KEYCLOAK_REALM}
      OAUTH2_PROXY_SKIP_OIDC_DISCOVERY: "true"
      OAUTH2_PROXY_INSECURE_OIDC_SKIP_ISSUER_VERIFICATION: "true"
      OAUTH2_PROXY_LOGIN_URL: ${PLATFORM_PUBLIC_SCHEME}://${KEYCLOAK_HOST}${PLATFORM_PUBLIC_PORT_SUFFIX}/realms/${KEYCLOAK_REALM}/protocol/openid-connect/auth
      OAUTH2_PROXY_REDEEM_URL: http://keycloak:8080/realms/${KEYCLOAK_REALM}/protocol/openid-connect/token
      OAUTH2_PROXY_OIDC_JWKS_URL: http://keycloak:8080/realms/${KEYCLOAK_REALM}/protocol/openid-connect/certs
      OAUTH2_PROXY_PROFILE_URL: http://keycloak:8080/realms/${KEYCLOAK_REALM}/protocol/openid-connect/userinfo
      OAUTH2_PROXY_CLIENT_ID: ${OAUTH2_PROXY_CLIENT_ID}-truck
      OAUTH2_PROXY_CLIENT_SECRET: ${OAUTH2_PROXY_CLIENT_SECRET}
      OAUTH2_PROXY_COOKIE_SECRET: ${OAUTH2_PROXY_COOKIE_SECRET}
      OAUTH2_PROXY_COOKIE_NAME: _oauth2_proxy_truck
      OAUTH2_PROXY_COOKIE_SECURE: "false"
      OAUTH2_PROXY_COOKIE_SAMESITE: lax
      OAUTH2_PROXY_COOKIE_DOMAINS: ${TRUCK_HOST}
      OAUTH2_PROXY_WHITELIST_DOMAINS: .${TRUCK_HOST}
      OAUTH2_PROXY_REDIRECT_URL: ${PLATFORM_PUBLIC_SCHEME}://${TRUCK_HOST}${PLATFORM_PUBLIC_PORT_SUFFIX}/oauth2/callback
      OAUTH2_PROXY_HTTP_ADDRESS: 0.0.0.0:4180
      OAUTH2_PROXY_EMAIL_DOMAINS: '*'
      OAUTH2_PROXY_SCOPE: openid profile email roles
      OAUTH2_PROXY_CODE_CHALLENGE_METHOD: S256
      OAUTH2_PROXY_REVERSE_PROXY: "true"
      OAUTH2_PROXY_SKIP_PROVIDER_BUTTON: "true"
      OAUTH2_PROXY_PASS_ACCESS_TOKEN: "true"
      OAUTH2_PROXY_PASS_AUTHORIZATION_HEADER: "true"
      OAUTH2_PROXY_SET_XAUTHREQUEST: "true"
      OAUTH2_PROXY_SET_AUTHORIZATION_HEADER: "true"
      OAUTH2_PROXY_PREFER_EMAIL_TO_USER: "false"
      OAUTH2_PROXY_UPSTREAMS: http://truck-frontend:80
    depends_on:
      keycloak-bootstrap:
        condition: service_completed_successfully
    networks:
      - edge
      - private
    labels:
      - traefik.enable=true
      - traefik.docker.network=${COMPOSE_PROJECT_NAME:-vrp-infra}_edge
      - traefik.http.routers.truck.rule=Host(`${TRUCK_HOST}`)
      - traefik.http.routers.truck.entrypoints=web
      - traefik.http.routers.truck.middlewares=platform-security@file
      - traefik.http.services.oauth2-proxy-truck.loadbalancer.server.port=4180
    restart: unless-stopped

  oauth2-proxy-spbu:
    image: quay.io/oauth2-proxy/oauth2-proxy:v7.7.1
    environment:
      OAUTH2_PROXY_PROVIDER: oidc
      OAUTH2_PROXY_OIDC_ISSUER_URL: ${KEYCLOAK_INTERNAL_URL}/realms/${KEYCLOAK_REALM}
      OAUTH2_PROXY_SKIP_OIDC_DISCOVERY: "true"
      OAUTH2_PROXY_INSECURE_OIDC_SKIP_ISSUER_VERIFICATION: "true"
      OAUTH2_PROXY_LOGIN_URL: ${PLATFORM_PUBLIC_SCHEME}://${KEYCLOAK_HOST}${PLATFORM_PUBLIC_PORT_SUFFIX}/realms/${KEYCLOAK_REALM}/protocol/openid-connect/auth
      OAUTH2_PROXY_REDEEM_URL: http://keycloak:8080/realms/${KEYCLOAK_REALM}/protocol/openid-connect/token
      OAUTH2_PROXY_OIDC_JWKS_URL: http://keycloak:8080/realms/${KEYCLOAK_REALM}/protocol/openid-connect/certs
      OAUTH2_PROXY_PROFILE_URL: http://keycloak:8080/realms/${KEYCLOAK_REALM}/protocol/openid-connect/userinfo
      OAUTH2_PROXY_CLIENT_ID: ${OAUTH2_PROXY_CLIENT_ID}-spbu
      OAUTH2_PROXY_CLIENT_SECRET: ${OAUTH2_PROXY_CLIENT_SECRET}
      OAUTH2_PROXY_COOKIE_SECRET: ${OAUTH2_PROXY_COOKIE_SECRET}
      OAUTH2_PROXY_COOKIE_NAME: _oauth2_proxy_spbu
      OAUTH2_PROXY_COOKIE_SECURE: "false"
      OAUTH2_PROXY_COOKIE_SAMESITE: lax
      OAUTH2_PROXY_COOKIE_DOMAINS: ${SPBU_HOST}
      OAUTH2_PROXY_WHITELIST_DOMAINS: .${SPBU_HOST}
      OAUTH2_PROXY_REDIRECT_URL: ${PLATFORM_PUBLIC_SCHEME}://${SPBU_HOST}${PLATFORM_PUBLIC_PORT_SUFFIX}/oauth2/callback
      OAUTH2_PROXY_HTTP_ADDRESS: 0.0.0.0:4180
      OAUTH2_PROXY_EMAIL_DOMAINS: '*'
      OAUTH2_PROXY_SCOPE: openid profile email roles
      OAUTH2_PROXY_CODE_CHALLENGE_METHOD: S256
      OAUTH2_PROXY_REVERSE_PROXY: "true"
      OAUTH2_PROXY_SKIP_PROVIDER_BUTTON: "true"
      OAUTH2_PROXY_PASS_ACCESS_TOKEN: "true"
      OAUTH2_PROXY_PASS_AUTHORIZATION_HEADER: "true"
      OAUTH2_PROXY_SET_XAUTHREQUEST: "true"
      OAUTH2_PROXY_SET_AUTHORIZATION_HEADER: "true"
      OAUTH2_PROXY_PREFER_EMAIL_TO_USER: "false"
      OAUTH2_PROXY_UPSTREAMS: http://spbu-frontend:80
    depends_on:
      keycloak-bootstrap:
        condition: service_completed_successfully
    networks:
      - edge
      - private
    labels:
      - traefik.enable=true
      - traefik.docker.network=${COMPOSE_PROJECT_NAME:-vrp-infra}_edge
      - traefik.http.routers.spbu.rule=Host(`${SPBU_HOST}`)
      - traefik.http.routers.spbu.entrypoints=web
      - traefik.http.routers.spbu.middlewares=platform-security@file
      - traefik.http.services.oauth2-proxy-spbu.loadbalancer.server.port=4180
    restart: unless-stopped

  oauth2-proxy-dispatch:
    image: quay.io/oauth2-proxy/oauth2-proxy:v7.7.1
    environment:
      OAUTH2_PROXY_PROVIDER: oidc
      OAUTH2_PROXY_OIDC_ISSUER_URL: ${KEYCLOAK_INTERNAL_URL}/realms/${KEYCLOAK_REALM}
      OAUTH2_PROXY_SKIP_OIDC_DISCOVERY: "true"
      OAUTH2_PROXY_INSECURE_OIDC_SKIP_ISSUER_VERIFICATION: "true"
      OAUTH2_PROXY_LOGIN_URL: ${PLATFORM_PUBLIC_SCHEME}://${KEYCLOAK_HOST}${PLATFORM_PUBLIC_PORT_SUFFIX}/realms/${KEYCLOAK_REALM}/protocol/openid-connect/auth
      OAUTH2_PROXY_REDEEM_URL: http://keycloak:8080/realms/${KEYCLOAK_REALM}/protocol/openid-connect/token
      OAUTH2_PROXY_OIDC_JWKS_URL: http://keycloak:8080/realms/${KEYCLOAK_REALM}/protocol/openid-connect/certs
      OAUTH2_PROXY_PROFILE_URL: http://keycloak:8080/realms/${KEYCLOAK_REALM}/protocol/openid-connect/userinfo
      OAUTH2_PROXY_CLIENT_ID: ${OAUTH2_PROXY_CLIENT_ID}-dispatch
      OAUTH2_PROXY_CLIENT_SECRET: ${OAUTH2_PROXY_CLIENT_SECRET}
      OAUTH2_PROXY_COOKIE_SECRET: ${OAUTH2_PROXY_COOKIE_SECRET}
      OAUTH2_PROXY_COOKIE_NAME: _oauth2_proxy_dispatch
      OAUTH2_PROXY_COOKIE_SECURE: "false"
      OAUTH2_PROXY_COOKIE_SAMESITE: lax
      OAUTH2_PROXY_COOKIE_DOMAINS: ${DISPATCH_HOST}
      OAUTH2_PROXY_WHITELIST_DOMAINS: .${DISPATCH_HOST}
      OAUTH2_PROXY_REDIRECT_URL: ${PLATFORM_PUBLIC_SCHEME}://${DISPATCH_HOST}${PLATFORM_PUBLIC_PORT_SUFFIX}/oauth2/callback
      OAUTH2_PROXY_HTTP_ADDRESS: 0.0.0.0:4180
      OAUTH2_PROXY_EMAIL_DOMAINS: '*'
      OAUTH2_PROXY_SCOPE: openid profile email roles
      OAUTH2_PROXY_CODE_CHALLENGE_METHOD: S256
      OAUTH2_PROXY_REVERSE_PROXY: "true"
      OAUTH2_PROXY_SKIP_PROVIDER_BUTTON: "true"
      OAUTH2_PROXY_PASS_ACCESS_TOKEN: "true"
      OAUTH2_PROXY_PASS_AUTHORIZATION_HEADER: "true"
      OAUTH2_PROXY_SET_XAUTHREQUEST: "true"
      OAUTH2_PROXY_SET_AUTHORIZATION_HEADER: "true"
      OAUTH2_PROXY_PREFER_EMAIL_TO_USER: "false"
      OAUTH2_PROXY_UPSTREAMS: http://dispatch-frontend:80
    depends_on:
      keycloak-bootstrap:
        condition: service_completed_successfully
    networks:
      - edge
      - private
    labels:
      - traefik.enable=true
      - traefik.docker.network=${COMPOSE_PROJECT_NAME:-vrp-infra}_edge
      - traefik.http.routers.dispatch.rule=Host(`${DISPATCH_HOST}`)
      - traefik.http.routers.dispatch.entrypoints=web
      - traefik.http.routers.dispatch.middlewares=platform-security@file
      - traefik.http.services.oauth2-proxy-dispatch.loadbalancer.server.port=4180
    restart: unless-stopped

  portal:
    build:
      context: ../vrp_portal
      dockerfile: Dockerfile
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: "3000"
      NEXT_PUBLIC_APP_NAME: VRP Petrofin Portal
      NEXT_PUBLIC_PORTAL_BASE_URL: ${PLATFORM_PUBLIC_SCHEME}://${PORTAL_HOST}${PLATFORM_PUBLIC_PORT_SUFFIX}
      NEXT_PUBLIC_TRUCK_URL: ${PLATFORM_PUBLIC_SCHEME}://${TRUCK_HOST}${PLATFORM_PUBLIC_PORT_SUFFIX}
      NEXT_PUBLIC_SPBU_URL: ${PLATFORM_PUBLIC_SCHEME}://${SPBU_HOST}${PLATFORM_PUBLIC_PORT_SUFFIX}
      NEXT_PUBLIC_DISPATCH_URL: ${PLATFORM_PUBLIC_SCHEME}://${DISPATCH_HOST}${PLATFORM_PUBLIC_PORT_SUFFIX}
      NEXT_PUBLIC_LOGOUT_URL: ${PLATFORM_PUBLIC_SCHEME}://${KEYCLOAK_HOST}${PLATFORM_PUBLIC_PORT_SUFFIX}/realms/${KEYCLOAK_REALM}/protocol/openid-connect/logout
      PORTAL_AUTH_MODE: headers
    expose:
      - "3000"
    healthcheck:
      test:
        - CMD-SHELL
        - wget -q -O /dev/null http://127.0.0.1:3000/health || exit 1
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - private
    restart: unless-stopped

  truck-frontend:
    image: nginx:1.27-alpine
    volumes:
      - ./infra/placeholders/truck-frontend:/usr/share/nginx/html:ro
    networks:
      - private
    restart: unless-stopped

  truck-backend:
    image: hashicorp/http-echo:1.0.0
    command:
      - -listen=:8080
      - '-text={"service":"truck-backend","status":"ok","message":"Placeholder backend. Replace with the real truck backend later."}'
    networks:
      - private
    restart: unless-stopped

  spbu-frontend:
    image: nginx:1.27-alpine
    volumes:
      - ./infra/placeholders/spbu-frontend:/usr/share/nginx/html:ro
    networks:
      - private
    restart: unless-stopped

  spbu-backend:
    image: hashicorp/http-echo:1.0.0
    command:
      - -listen=:8080
      - '-text={"service":"spbu-backend","status":"ok","message":"Placeholder backend. Replace with the real SPBU backend later."}'
    networks:
      - private
    restart: unless-stopped

  dispatch-frontend:
    image: nginx:1.27-alpine
    volumes:
      - ./infra/placeholders/dispatch-frontend:/usr/share/nginx/html:ro
    networks:
      - private
    restart: unless-stopped

  dispatch-backend:
    image: hashicorp/http-echo:1.0.0
    command:
      - -listen=:8080
      - '-text={"service":"dispatch-backend","status":"ok","message":"Placeholder backend. Replace with the real dispatch backend later."}'
    networks:
      - private
    restart: unless-stopped

networks:
  edge:
    driver: bridge
  private:
    driver: bridge
    internal: true

volumes:
  keycloak_db_data:
