      - traefik.http.routers.truck.tls.certresolver=letsencrypt
      - traefik.http.routers.truck.middlewares=platform-security@file
      - traefik.http.services.oauth2-proxy-truck.loadbalancer.server.port=4180
    restart: unless-stopped

  oauth2-proxy-spbu:
    image: quay.io/oauth2-proxy/oauth2-proxy:v7.7.1
    environment:
