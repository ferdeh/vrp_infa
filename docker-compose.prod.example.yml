  portal:
    image: nginx:1.27-alpine
    volumes:
      - ./infra/placeholders/portal:/usr/share/nginx/html:ro
    networks:
      - private
    restart: unless-stopped

  truck-frontend:
    image: nginx:1.27-alpine
    volumes:
      - ./infra/placeholders/truck-frontend:/usr/share/nginx/html:ro
    networks:
      - private
