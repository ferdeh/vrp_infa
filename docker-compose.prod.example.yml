      - traefik.docker.network=${COMPOSE_PROJECT_NAME:-vrp-infra}_edge
      - traefik.http.routers.planner.rule=Host(`${PLANNER_HOST}`)
      - traefik.http.routers.planner.entrypoints=websecure
      - traefik.http.routers.planner.tls=true
      - traefik.http.routers.planner.tls.certresolver=letsencrypt
      - traefik.http.routers.planner.middlewares=platform-security@file
      - traefik.http.services.oauth2-proxy-planner.loadbalancer.server.port=4180
